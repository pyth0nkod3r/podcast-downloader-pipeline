id: rss-podcast-poc
namespace: deeptech

concurrency:
  limit: 1
  behavior: QUEUE

inputs:
  - id: rss_url
    type: SELECT
    displayName: Select rss feed
    required: true
    values: [ "commit_your_code", "tech_news", "simplecast_demo" ]
    defaults: "commit_your_code"

  - id: execution_mode
    type: SELECT
    defaults: manual
    values:
      - manual
      - scheduled

variables:
  rss_mapping:
    commit_your_code: https://anchor.fm/s/1cd48480/podcast/rss
    tech_news: https://rss.nytimes.com/services/xml/rss/nyt/Technology.xml
    simplecast_demo: https://feeds.simplecast.com/54nAGcIl

tasks:

  - id: is_scheduled
    type: io.kestra.plugin.core.flow.If
    condition: "{{trigger is defined and trigger.date is defined}}"
    then:
      - id: label_scheduled
        type: io.kestra.plugin.core.execution.Labels
        labels:
          execution_type: scheduled
          is_backfill: "true"
          trigger_date: "{{ trigger.date ?? execution.startDate ?? now() }}"
    else:
      - id: label_manual
        type: io.kestra.plugin.core.execution.Labels
        labels:
          execution_type: manual
          is_backfill: "false"
          trigger_date: none

  - id: set_label
    type: io.kestra.plugin.core.execution.Labels
    labels:
      rssUrl: "{{inputs.rss_url}}"
      execution_mode: "{{inputs.execution_mode}}"

  #-----EXTRACTION......
  # Fetch rss
  - id: rss_fetch
    type: io.kestra.plugin.core.http.Download
    uri: "{{vars.rss_mapping[inputs.rss_url]}}"
    method: GET

  #------NORMALIZATION-------
  # xml to ion
  - id: xml_to_ion
    type: io.kestra.plugin.serdes.xml.XmlToIon
    from: "{{outputs.rss_fetch.uri}}"

  # ion to json
  - id: ion_to_json
    type: io.kestra.plugin.serdes.json.IonToJson
    from: "{{outputs.xml_to_ion.uri}}"

  # extraction and transformation
  - id: extract_podcasts
    type: io.kestra.plugin.scripts.python.Script
    inputFiles:
      json_data.json: "{{outputs.ion_to_json.uri}}"
    outputFiles:
      - podcast_data.csv
    script: |
      import json
      import csv


      #---helpers---
      def extract_guid(guid_field):
        if isinstance(guid_field, dict):
          return guid_field.get("content")
        return guid_field

      def extract_creator(item):
        return (
        item.get("dc:creator")
        or item.get("author")
        or item.get("itunes:author")
        )

      def extract_audio_url(item):
        enclosure = item.get("enclosure")
        if isinstance(enclosure, dict):
          return enclosure.get("@url") or enclosure.get("url")
        return None


      #---Load JSON--------

      with open("json_data.json", "r", encoding="utf-8") as f:
        raw_json = json.load(f)
      items = raw_json["rss"]["channel"]["item"]

      #----Transform data----------
      source = "{{inputs.rss_url}}"

      result = [
        {
          "title": item.get("title"),
          "link": item.get("link"),
          "description": item.get("description"),
          "duration": item.get("itunes:duration"),
          "creator": extract_creator(item),
          "pubDate": item.get("pubDate"),
          "guid": extract_guid(item.get("guid")),
          "audio_url": extract_audio_url(item),
          "source": source
        }
        for item in items
      ]
      # print(f'result:{result}')
      print(f"Extracted {len(result)} episodes")

      #----Write CSV------

      with open('podcast_data.csv', 'w', newline='', encoding="utf-8") as file:
        writer = csv.DictWriter(
        file,
        fieldnames=[
          "guid",
          "title",
          "link",
          "description",
          "duration",
          "creator",
          "pubDate",
          "audio_url",
          "source"
          ],
          quoting=csv.QUOTE_MINIMAL
        )

        cleaned = [r for r in result if r["guid"] and r["title"]]
        print(f"Valid records: {len(cleaned)} / {len(result)}")

        writer.writeheader()
        writer.writerows(cleaned)

        invalid = [r for r in result if not (r["guid"] and r["title"])]
        print(f"Invalid records dropped: {len(invalid)}")

      print("=== PIPELINE SUMMARY ===")
      print(f"Feed: {source}")
      print(f"Total extracted: {len(result)}")
      print(f"Valid records: {len(cleaned)}")
      print(f"Execution time: {{ now() }}")

      #----Write audio URL list for download loop------
      import json as _json
      audio_items = [
        {"guid": r["guid"], "audio_url": r["audio_url"], "title": r["title"]}
        for r in cleaned if r.get("audio_url")
      ]
      with open("audio_urls.json", "w", encoding="utf-8") as af:
        _json.dump(audio_items, af)
      print(f"Audio URLs to download: {len(audio_items)}")

  # Postgres
  - id: create_table
    type: io.kestra.plugin.jdbc.postgresql.Queries
    sql: |
      CREATE TABLE IF NOT EXISTS podcast_metadata (
      guid TEXT PRIMARY KEY,
      title TEXT,
      link TEXT,
      description TEXT,
      duration TEXT,
      creator TEXT,
      pubDate TEXT,
      audio_url TEXT,
      created_at TIMESTAMP DEFAULT NOW(),
      source TEXT
      )

  - id: create_staging_table
    type: io.kestra.plugin.jdbc.postgresql.Queries
    sql: |
      DROP TABLE IF EXISTS podcast_staging;
      CREATE TABLE podcast_staging (
      guid TEXT,
      title TEXT,
      link TEXT,
      description TEXT,
      duration TEXT,
      creator TEXT,
      pubDate TEXT,
      audio_url TEXT,
      source TEXT
      )

  - id: load_staging_table
    type: io.kestra.plugin.jdbc.postgresql.CopyIn
    format: CSV
    from: "{{render(outputs.extract_podcasts.outputFiles['podcast_data.csv'])}}"
    table: podcast_staging
    columns:
      - guid
      - title
      - link
      - description
      - duration
      - creator
      - pubDate
      - audio_url
      - source

  - id: store_podcast_metadata
    type: io.kestra.plugin.jdbc.postgresql.Queries
    sql: |
      MERGE INTO podcast_metadata as PM
      USING podcast_staging as PS
      ON PM.guid = PS.guid
      WHEN NOT MATCHED THEN
      INSERT (
      guid,
      title,
      link,
      description,
      duration,
      creator,
      pubDate,
      audio_url,
      source
      )
      VALUES (
      PS.guid,
      PS.title,
      PS.link,
      PS.description,
      PS.duration,
      PS.creator,
      PS.pubDate,
      PS.audio_url,
      PS.source
      )

  #------AUDIO DOWNLOAD-------
  # Downloads each audio file to the persistent /app/storage/audio volume.
  # Files are named by sanitized episode title so they are human-readable.
  - id: download_audio
    type: io.kestra.plugin.scripts.python.Script
    inputFiles:
      audio_urls.json: "{{render(outputs.extract_podcasts.outputFiles['audio_urls.json'])}}"
    outputFiles:
      - download_results.csv
    script: |
      import json
      import os
      import re
      import requests

      AUDIO_DIR = "/app/storage/audio"
      os.makedirs(AUDIO_DIR, exist_ok=True)

      def sanitize_title(title):
        """Convert episode title to a safe filename."""
        safe = re.sub(r'[^\w\s-]', '', title or 'unknown')
        safe = re.sub(r'[\s_]+', '_', safe).strip('_')
        return safe[:100]  # cap filename length

      with open("audio_urls.json", "r", encoding="utf-8") as f:
        items = json.load(f)

      results = []
      for item in items:
        guid = item["guid"]
        url = item["audio_url"]
        title = item.get("title", guid)
        filename = sanitize_title(title) + ".mp3"
        filepath = os.path.join(AUDIO_DIR, filename)

        # Skip if already downloaded
        if os.path.exists(filepath):
          print(f"[SKIP] Already exists: {filename}")
          results.append({"guid": guid, "file_path": filepath, "status": "skipped"})
          continue

        try:
          response = requests.get(url, stream=True, timeout=60)
          response.raise_for_status()
          with open(filepath, "wb") as audio_file:
            for chunk in response.iter_content(chunk_size=8192):
              audio_file.write(chunk)
          print(f"[OK] Downloaded: {filename}")
          results.append({"guid": guid, "file_path": filepath, "status": "success"})
        except Exception as e:
          print(f"[FAIL] {filename}: {e}")
          results.append({"guid": guid, "file_path": "", "status": f"error: {e}"})

      with open("download_results.csv", "w", newline="", encoding="utf-8") as rf:
        import csv
        writer = csv.DictWriter(rf, fieldnames=["guid", "file_path", "status"])
        writer.writeheader()
        writer.writerows([{"guid": r["guid"], "file_path": r["file_path"], "status": r["status"]} for r in results])

      ok = sum(1 for r in results if r["status"] == "success")
      skip = sum(1 for r in results if r["status"] == "skipped")
      fail = sum(1 for r in results if r["status"].startswith("error"))
      print(f"=== AUDIO DOWNLOAD SUMMARY ===")
      print(f"Downloaded: {ok} | Skipped (exists): {skip} | Failed: {fail}")

  #------DOWNLOAD TRACKING-------
  - id: create_downloads_table
    type: io.kestra.plugin.jdbc.postgresql.Queries
    sql: |
      CREATE TABLE IF NOT EXISTS podcast_downloads (
        guid       TEXT PRIMARY KEY,
        file_path  TEXT,
        status     TEXT,
        downloaded_at TIMESTAMP DEFAULT NOW()
      )

  - id: create_downloads_staging
    type: io.kestra.plugin.jdbc.postgresql.Queries
    sql: |
      DROP TABLE IF EXISTS podcast_downloads_staging;
      CREATE TABLE podcast_downloads_staging (
        guid      TEXT,
        file_path TEXT,
        status    TEXT
      )

  - id: load_downloads_staging
    type: io.kestra.plugin.jdbc.postgresql.CopyIn
    format: CSV
    from: "{{render(outputs.download_audio.outputFiles['download_results.csv'])}}"
    table: podcast_downloads_staging
    columns:
      - guid
      - file_path
      - status

  - id: merge_downloads
    type: io.kestra.plugin.jdbc.postgresql.Queries
    sql: |
      MERGE INTO podcast_downloads AS PD
      USING podcast_downloads_staging AS PDS
      ON PD.guid = PDS.guid
      WHEN MATCHED THEN
        UPDATE SET
          file_path    = PDS.file_path,
          status       = PDS.status,
          downloaded_at = NOW()
      WHEN NOT MATCHED THEN
        INSERT (guid, file_path, status, downloaded_at)
        VALUES (PDS.guid, PDS.file_path, PDS.status, NOW())

  - id: purge_files
    type: io.kestra.plugin.core.storage.PurgeCurrentExecutionFiles
    description: Remove intermediate CSV/JSON files; audio files are already persisted to the podcast_audio volume.
    include:
      - "podcast_data.csv"
      - "audio_urls.json"
      - "download_results.csv"


pluginDefaults:
  - type: io.kestra.plugin.jdbc.postgresql
    values:
      url: jdbc:postgresql://pgdatabase:5432/podcast_db
      username: "{{ secret('POSTGRES_USERNAME') }}"
      password: "{{ secret('POSTGRES_PASSWORD') }}"

triggers:
  - id: tech_news_schedule
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 * * * *"
    inputs:
      rss_url: tech_news
      execution_mode: scheduled

  - id: commit_your_code_schedule
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 * * * *"
    inputs:
      rss_url: commit_your_code
      execution_mode: scheduled

  - id: simplecast_schedule
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 * * * *"
    inputs:
      rss_url: simplecast_demo
      execution_mode: scheduled
