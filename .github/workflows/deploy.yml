name: Deploy Pipeline

on:
  push:
    branches: [main]

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      flows: ${{ steps.changes.outputs.flows }}
      infra: ${{ steps.changes.outputs.infra }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            flows:
              - 'flows/**'
            infra:
              - 'docker-compose.yml'

  validate:
    name: Validate YAML
    runs-on: ubuntu-latest
    needs: detect-changes
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint flow files
        run: yamllint -c .github/linters/.yamllint.yml flows/

  deploy-flows:
    name: Deploy Kestra Flows
    runs-on: ubuntu-latest
    needs: [detect-changes, validate]
    if: needs.detect-changes.outputs.flows == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy flows to Kestra
        run: |
          for flow_file in flows/*.yaml; do
            echo "Deploying: $flow_file"
            curl -f -X PUT "${{ secrets.KESTRA_URL }}/api/v1/flows" \
              -H "Content-Type: application/x-yaml" \
              -u "${{ secrets.KESTRA_USER }}:${{ secrets.KESTRA_PASSWORD }}" \
              --data-binary @"$flow_file"
            echo ""
          done

      - name: Health check — Kestra API
        run: |
          echo "Checking Kestra API..."
          curl -f -s -o /dev/null -w "HTTP %{http_code}" \
            -u "${{ secrets.KESTRA_USER }}:${{ secrets.KESTRA_PASSWORD }}" \
            "${{ secrets.KESTRA_URL }}/api/v1/flows"
          echo " ✅ Kestra API is healthy"

  deploy-infra:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: [detect-changes, validate]
    if: needs.detect-changes.outputs.infra == 'true'
    steps:
      - name: Trigger Coolify redeploy
        run: |
          echo "Triggering Coolify webhook for infrastructure redeploy..."
          curl -f -X POST "${{ secrets.COOLIFY_WEBHOOK_URL }}"
          echo ""
          echo "✅ Coolify redeploy triggered"

  notify-on-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [validate, deploy-flows, deploy-infra]
    if: failure()
    steps:
      - name: Send failure email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "❌ Pipeline Deploy Failed — ${{ github.repository }}"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: ${{ secrets.SMTP_USERNAME }}
          body: |
            Deployment failed for podcast-downloader-pipeline.

            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Please check the GitHub Actions log for details.
